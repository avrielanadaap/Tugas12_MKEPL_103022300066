name: SonarCloud Analysis
  on:
    push:
      branches:
        - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 

      - uses: actions/setup-java@v4 
        with:
        distribution: temurin
        java-version: 17
      - name: Build
        run: mvn clean verify
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar